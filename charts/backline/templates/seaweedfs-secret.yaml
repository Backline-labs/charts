{{- if .Values.seaweedfs.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: seaweedfs-s3-secret
  namespace: {{ default .Release.Namespace .Values.namespaceOverride | trunc 63 | trimSuffix "-" }}
  labels:
    app: seaweedfs
type: Opaque
stringData:
  accessKey: {{ .Values.objectStorage.accessKey | quote }}
  secretKey: {{ .Values.objectStorage.secretKey | quote }}
  seaweedfs_s3_config: {{ dict "identities" (list (dict "name" "backline" "credentials" (list (dict "accessKey" .Values.objectStorage.accessKey "secretKey" .Values.objectStorage.secretKey)) "actions" (list "Admin" "Read" "Write" "List" "Tagging"))) | toJson | quote }}
{{- end }}
