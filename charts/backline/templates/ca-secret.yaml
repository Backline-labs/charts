{{- if (include "backline.caCert" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: backline-ca
  namespace: {{ default .Release.Namespace .Values.namespaceOverride | trunc 63 | trimSuffix "-" }}
type: Opaque
data:
  # Base64-encoded PEM CA bundle; nospace tolerates line-wrapped base64.
  ca.crt: {{ include "backline.caCert" . | nospace | quote }}
{{- end }}
