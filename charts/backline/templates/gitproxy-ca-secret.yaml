{{- if and ((.Values.gitproxy).enabled) .Values.gitproxy.caCert }}
apiVersion: v1
kind: Secret
metadata:
  name: gitproxy-ca
  namespace: {{ default .Release.Namespace .Values.namespaceOverride | trunc 63 | trimSuffix "-" }}
type: Opaque
data:
  # Value is the base64-encoded PEM CA bundle; nospace tolerates line-wrapped base64.
  ca.crt: {{ .Values.gitproxy.caCert | nospace | quote }}
{{- end }}
