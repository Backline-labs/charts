# Global configuration
accessKey: ""
environment: "production"
namespaceOverride: "backline"

# ============================================================================
# OUTBOUND PROXY (optional)
# ============================================================================
# For clusters that route egress through a corporate proxy. When set, these are
# injected (both upper- and lower-case) into the worker, gitproxy and janitor
# containers. Leave empty to connect directly.
# Include your internal hosts (e.g. a self-hosted git server) and in-cluster
# addresses in noProxy so they are reached directly, not through the proxy.
proxy:
  httpProxy: ""
  httpsProxy: ""
  noProxy: ""

# ============================================================================
# CUSTOM CA (optional)
# ============================================================================
# Base64-encoded PEM CA certificate(s) used for trusted communication with a
# self-hosted git host signed by an internal/corporate CA.
# Generate with:  base64 -w0 ca.pem   (or:  base64 < ca.pem | tr -d '\n')
customCaCert: ""

# ============================================================================
# SEAWEEDFS OBJECT STORAGE (S3-compatible, replaces MinIO)
# ============================================================================
# ── Object-storage credentials (worker ⇄ S3) ───────────────────────────────
# Written to the chart-managed `seaweedfs-s3-secret` Secret, shared by the
# worker and the SeaweedFS S3 gateway (single source of truth). To swap the
# backing store later (e.g. RustFS), repoint the `seaweedfs` dependency in
# Chart.yaml + the worker endpoint, and keep these credentials.
objectStorage:
  accessKey: "backline"
  secretKey: "backline-seaweedfs-password"

# ── SeaweedFS object storage (subchart) ─────────────────────────────────────
# S3-compatible store, wired as a Helm dependency (replaces the MinIO subchart).
# Runs as a single-node "all-in-one" pod (master+volume+filer+s3), mirroring the
# previous standalone MinIO. Set seaweedfs.enabled=false to use an external S3.
seaweedfs:
  enabled: true
  fullnameOverride: seaweedfs
  # all-in-one runs all roles in one pod, so disable the separate workloads.
  master:
    enabled: false
  volume:
    enabled: false
  filer:
    enabled: false
  s3:
    enabled: false        # the S3 gateway is served by the all-in-one pod
    port: 8333
  allInOne:
    enabled: true
    data:
      type: persistentVolumeClaim
      size: 10Gi
      storageClass: ""
    s3:
      enabled: true
      enableAuth: true
      # Identities/credentials come from the chart-managed Secret above.
      existingConfigSecret: seaweedfs-s3-secret
      createBuckets:
        - name: operational
        - name: static-assets
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

# Janitor component
janitor:
  image:
    registry: docker.io
    name: dtzar/helm-kubectl
    tag: 3.16.1
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# Worker component
worker:
  replicaCount: 1
  image:
    tag: "0000001-0000000001"
    pullPolicy: IfNotPresent
  service:
    httpPort: 8080
  modelName: "bedrock/us.anthropic.claude-sonnet-4-5-20250929-v1:0"
  structuredOutputModelName: "claude-haiku-4-5-20251001"
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 5
  readinessProbe:
    httpGet:
      path: /readiness
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 3
  nodeSelector: {}
  tolerations: []
  affinity: {}
  otel:
    enabled: true
    collector:
      image: public.ecr.aws/aws-observability/aws-otel-collector:v0.45.1

# ============================================================================
# GITPROXY COMPONENT (On-prem git server connectivity)
# ============================================================================
gitproxy:
  enabled: false
  replicaCount: 1
  image:
    tag: "0000001-0000000001"
    pullPolicy: IfNotPresent
  service:
    httpPort: 8080
  adapter:
    skipCertVerification: false
    maxRetries: 3
    retryDelay: "1s"
  temporal:
    maxConcurrentActivities: 20
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 5
  readinessProbe:
    httpGet:
      path: /readiness
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 3
  nodeSelector: {}
  tolerations: []
  affinity: {}
  otel:
    enabled: true
    collector:
      image: public.ecr.aws/aws-observability/aws-otel-collector:v0.45.1

# ============================================================================
# RESOURCE PROFILES FOR EPHEMERAL JOBS
# ============================================================================
resourceProfiles:
  small:
    requests:
      cpu: "250m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  medium:
    requests:
      cpu: "500m"
      memory: "4Gi"
    limits:
      cpu: "2000m"
      memory: "8Gi"
  large:
    requests:
      cpu: "1000m"
      memory: "8Gi"
    limits:
      cpu: "4000m"
      memory: "16Gi"
  xlarge:
    requests:
      cpu: "2000m"
      memory: "16Gi"
    limits:
      cpu: "8000m"
      memory: "32Gi"
